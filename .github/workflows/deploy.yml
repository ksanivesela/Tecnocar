name: Deploy a VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar archivos al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "/opt/tecnocar"
          overwrite: true

      - name: Escribir .env y desplegar con Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/tecnocar
            cat > .env << ENVEOF
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=tecnocar
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=7d
            FRONTEND_URL=http://tecnocar.byronrm.com
            BACKEND_URL=http://backtec.byronrm.com
            FRONTEND_DOMAIN=tecnocar.byronrm.com
            BACKEND_DOMAIN=backtec.byronrm.com
            ADMINER_DOMAIN=pgtec.byronrm.com
            ENVEOF
            docker compose up -d --build
            docker compose exec -T backend npx prisma db seed
