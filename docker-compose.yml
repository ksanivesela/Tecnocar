services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tecnocar

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGINS: ${FRONTEND_URL}
      UPLOADS_DIR: uploads
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tecnocar
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.tecnocar-backend.rule=Host(`${BACKEND_DOMAIN}`)"
      - "traefik.http.routers.tecnocar-backend.entrypoints=websecure"
      - "traefik.http.routers.tecnocar-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.tecnocar-backend.loadbalancer.server.port=3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${BACKEND_URL}/api
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - tecnocar
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.tecnocar-frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.tecnocar-frontend.entrypoints=websecure"
      - "traefik.http.routers.tecnocar-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.tecnocar-frontend.loadbalancer.server.port=80"

  adminer:
    image: adminer:4
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - tecnocar
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.tecnocar-adminer.rule=Host(`${ADMINER_DOMAIN}`)"
      - "traefik.http.routers.tecnocar-adminer.entrypoints=websecure"
      - "traefik.http.routers.tecnocar-adminer.tls.certresolver=letsencrypt"
      - "traefik.http.services.tecnocar-adminer.loadbalancer.server.port=8080"

networks:
  tecnocar:
    driver: bridge
  traefik:
    external: true

volumes:
  postgres_data:
  backend_uploads:
